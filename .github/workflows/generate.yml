name: AI Code Generator (Local Model)

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'What to build / how to improve'
        required: false
        default: ''
        type: string
      session_id:
        description: 'Session ID'
        required: true
        type: string
      max_iters:
        description: 'Max iterations (test+fix loops)'
        default: '3'
        type: string
      max_tokens:
        description: 'Max tokens per model response'
        default: '32768'
        type: string
      file_name:
        description: 'Attached filename (empty = generate mode)'
        default: ''
        type: string
      file_content:
        description: 'Attached file content base64-encoded'
        default: ''
        type: string
      total_budget:
        description: 'Total token budget across all iterations (0 = use max_iters mode)'
        default: '0'
        type: string
      target_repo:
        description: 'Target repo to analyze and commit to (owner/repo, empty = this repo)'
        default: ''
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore Ollama model cache (~4.7 GB)
        id: ollama-cache
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-qwen25-coder-7b-q4
          restore-keys: |
            ollama-qwen25-coder-7b-

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.ai/install.sh | sh
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:11434/api/tags > /dev/null 2>&1 && break
            sleep 2
          done
          echo "Ollama server ready"

      - name: Load model from cache (if available)
        if: steps.ollama-cache.outputs.cache-hit == 'true'
        run: |
          echo "Cache hit — model already in ~/.ollama"
          ollama list
          echo "Write hello world in Python" | timeout 120 ollama run qwen2.5-coder:7b || true

      - name: Download model (first run only)
        if: steps.ollama-cache.outputs.cache-hit != 'true'
        run: |
          echo "First run — downloading Qwen2.5-Coder-7B (~4.7 GB)..."
          ollama pull qwen2.5-coder:7b
          ollama list

      - name: Analyze target repo
        if: inputs.target_repo != ''
        env:
          TARGET_REPO: ${{ inputs.target_repo }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Cloning ${TARGET_REPO}..."
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${TARGET_REPO}.git" /tmp/target-repo 2>&1 || {
            echo "Cannot clone ${TARGET_REPO} — check GITHUB_TOKEN read access"; exit 1
          }
          echo "Cloned OK"
          python3 read_repo.py

      - name: System info
        run: |
          echo "CPU : $(nproc) cores  $(grep -m1 'model name' /proc/cpuinfo | cut -d: -f2 | xargs)"
          echo "RAM : $(free -h | awk '/^Mem/{print $2}')"
          echo "Disk: $(df -h . | awk 'NR==2{print $4}') available"
          echo "Mode: ${{ inputs.file_name != '' && 'IMPROVE' || 'GENERATE' }}"

      - name: Run VIBE-CODE generator
        env:
          PROMPT:        ${{ inputs.prompt }}
          SESSION_ID:    ${{ inputs.session_id }}
          MAX_ITERS:     ${{ inputs.max_iters }}
          MAX_TOKENS:    ${{ inputs.max_tokens }}
          TOTAL_BUDGET:  ${{ inputs.total_budget }}
          TARGET_REPO:   ${{ inputs.target_repo }}
          FILE_NAME:     ${{ inputs.file_name }}
          FILE_CONTENT:  ${{ inputs.file_content }}
        run: |
          mkdir -p output
          python3 generate.py

      - name: Commit to target repo
        if: inputs.target_repo != '' && success()
        env:
          TARGET_REPO: ${{ inputs.target_repo }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FOLDER=$(ls -t output/ | head -1)
          echo "Committing output/${FOLDER} to ${TARGET_REPO}"
          cd /tmp/target-repo
          mkdir -p vibecode && cp -r "$GITHUB_WORKSPACE/output/${FOLDER}"/* vibecode/ 2>/dev/null || true
          git config user.name  "VIBE-CODE Bot"
          git config user.email "vibecode-bot@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            SLUG=$(printf '%s' "${{ inputs.prompt }}" | cut -c1-55)
            git commit -m "feat(vibecode): ${SLUG}"
            git push "https://x-access-token:${GH_TOKEN}@github.com/${TARGET_REPO}.git" HEAD \
              || echo "Push failed — check token write access to ${TARGET_REPO}"
          fi

      - name: Commit and push results
        run: |
          git config user.name  "VIBE-CODE Bot"
          git config user.email "vibecode-bot@users.noreply.github.com"
          git add output/
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            MODE="${{ inputs.file_name != '' && 'improve' || 'generate' }}"
            SLUG=$(printf '%s%s' "${{ inputs.file_name }}" "${{ inputs.prompt }}" | cut -c1-55)
            git commit -m "feat(vibe/${MODE}): ${SLUG}"
            git push
          fi
